services:
  magify-postgree:
    build:
      context: ../db
      dockerfile: Dockerfile
    image: magify-postgree:17
    container_name: magify-postgree
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ../db/init/001-create-users.sql:/docker-entrypoint-initdb.d/001-create-users.sql:ro
      - ../db/init/002-create-databases.sql:/docker-entrypoint-initdb.d/002-create-databases.sql:ro
      - magify-postgree-data:/var/lib/postgresql/data
    networks:
      - magify-network

  magify-db-import:
    image: dimitri/pgloader:latest
    container_name: magify-db-import
    platform: ${PGLOADER_PLATFORM:-linux/amd64}
    depends_on:
      magify-postgree:
        condition: service_healthy
    env_file:
      - .env.prod
    entrypoint: ["/bin/sh", "/import/import.sh"]
    volumes:
      - ../db:/db:ro
      - ../db/import.sh:/import/import.sh:ro
    networks:
      - magify-network

  magify-redis:
    image: redis:7-alpine
    container_name: magify-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - magify-redis-data:/data
    networks:
      - magify-network

networks:
  magify-network:
    external: true

volumes:
  magify-postgree-data:
  magify-redis-data:
