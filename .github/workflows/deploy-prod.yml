name: Build and deploy production

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: magify-expert-shopify

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - image: blog-api
            dockerfile: ./apps/blog-api/Dockerfile.prod.arm64
          - image: blog-web
            dockerfile: ./apps/blog-web/Dockerfile.prod.arm64
          - image: dashboard
            dockerfile: ./apps/dashboard/Dockerfile.prod.arm64

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64/v8
          push: true
          tags: ghcr.io/${{ env.OWNER }}/${{ matrix.image }}:latest
