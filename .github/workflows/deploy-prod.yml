name: Deploy production

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: blog-api
            context: ./apps/blog/api
            dockerfile: ./apps/blog/api/Dockerfile.prod
          - name: blog-web
            context: ./apps/blog/web
            dockerfile: ./apps/blog/web/Dockerfile.prod
          - name: prospection-api
            context: ./apps/prospection/api
            dockerfile: ./apps/prospection/api/Dockerfile.prod
          - name: prospection-web
            context: ./apps/prospection/web
            dockerfile: ./apps/prospection/web/Dockerfile.prod
          - name: social-api
            context: ./apps/social/api
            dockerfile: ./apps/social/api/Dockerfile.prod
          - name: social-web
            context: ./apps/social/web
            dockerfile: ./apps/social/web/Dockerfile.prod

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ARM64 and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/${{ matrix.name }}:prod

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on Raspberry
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.RASPBERRY_HOST }}
          username: ${{ secrets.RASPBERRY_USER }}
          key: ${{ secrets.RASPBERRY_SSH_KEY }}
          script: |
            cd /home/admin/apps/magify-apps/infra
            ./scripts/deploy.sh
