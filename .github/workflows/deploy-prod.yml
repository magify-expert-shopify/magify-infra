name: Build and deploy production

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: magify-expert-shopify

jobs:
  build:
    runs-on: [self-hosted, Linux, ARM64]

    strategy:
      matrix:
        include:
          - image: blog-api
            dockerfile: ./apps/blog-api/Dockerfile.prod.arm64
          - image: blog-web
            dockerfile: ./apps/blog-web/Dockerfile.prod.arm64
            package: magify-blog-web
          - image: dashboard
            dockerfile: ./apps/dashboard/Dockerfile.prod.arm64
          - image: social-api
            dockerfile: ./apps/social-api/Dockerfile.prod.arm64

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64/v8
          cache-from: type=gha,scope=${{ matrix.package || matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.package || matrix.image }}
          push: true
          tags: ghcr.io/${{ env.OWNER }}/${{ matrix.package || matrix.image }}:latest
