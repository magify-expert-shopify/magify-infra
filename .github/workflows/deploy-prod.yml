name: Build and deploy production

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: magify-expert-shopify

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    strategy:
      matrix:
        include:
          - image: blog-api
            dockerfile: ./apps/blog-api/Dockerfile.prod.arm64
            package: magify-blog-api
          - image: blog-web
            dockerfile: ./apps/blog-web/Dockerfile.prod.arm64
            package: magify-blog-web
          - image: dashboard
            dockerfile: ./apps/dashboard/Dockerfile.prod.arm64
          - image: prospection-api
            dockerfile: ./apps/prospection-api/Dockerfile.prod.arm64
            package: magify-prospection-api
          - image: prospection-web
            dockerfile: ./apps/prospection-web/Dockerfile.prod.arm64
            package: magify-prospection-web
          - image: social-web
            dockerfile: ./apps/social-web/Dockerfile.prod.arm64
            package: magify-social-web
          - image: social-api
            dockerfile: ./apps/social-api/Dockerfile.prod.arm64
            package: magify-social-api

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64/v8
          cache-from: type=gha,scope=${{ matrix.package || matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.package || matrix.image }}
          push: true
          tags: ghcr.io/${{ env.OWNER }}/${{ matrix.package || matrix.image }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    env:
      RASPBERRY_HOST: ${{ secrets.RASPBERRY_HOST || '192.168.1.91' }}
      RASPBERRY_USER: ${{ secrets.RASPBERRY_USER || 'admin' }}

    steps:
      - name: Configure SSH
        run: |
          if [ -z "${{ secrets.RASPBERRY_SSH_KEY }}" ]; then
            echo "Missing secret: RASPBERRY_SSH_KEY"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.RASPBERRY_SSH_KEY }}" > ~/.ssh/magify_raspberry
          chmod 600 ~/.ssh/magify_raspberry
          ssh-keyscan -H "$RASPBERRY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on Raspberry
        run: |
          ssh -i ~/.ssh/magify_raspberry -o IdentitiesOnly=yes "$RASPBERRY_USER@$RASPBERRY_HOST" "bash -lc 'set -euo pipefail; cd /home/$RASPBERRY_USER/apps/magify-apps && git fetch origin main && git reset --hard origin/main && bash infra/scripts/deploy.sh'"
